<title>Rascal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#040408; --card:#0e0e16; --card2:#16161f; --bd:rgba(255,255,255,.07);
  --tx:#eeeef8; --mu:#5a5a7a; --mu2:#3a3a5a;
  --jason:#3b82f6; --kerry:#ec4899; --oliver:#22c55e; --louis:#a855f7; --hugo:#f59e0b;
  --all:#06b6d4; --holiday:#334155; --accent:#22c55e;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto}

/* BODY */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
.nav{display:flex;flex-shrink:0;background:rgba(4,4,8,.97);backdrop-filter:blur(24px);border-top:1px solid var(--bd);padding:6px 0 calc(var(--sb) + 6px)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:7px 0;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;color:var(--mu);letter-spacing:1px;text-transform:uppercase;transition:color .2s}
.nb.on{color:var(--accent)}
.ni{font-size:22px;line-height:1}

/* ══ LANDING ══ */
.land{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100%;padding:calc(var(--st) + 40px) 32px calc(40px);
  background:radial-gradient(ellipse at 50% 30%, rgba(34,197,94,.06) 0%, transparent 65%);
}
.land-logo{margin-bottom:28px}
.land-wordmark{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;letter-spacing:-3px;color:#fff;line-height:1;text-align:center;margin-bottom:6px}
.land-tag{font-size:12px;color:var(--mu);letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:48px}
.land-btns{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:40px}
.land-btn{
  width:100%;padding:16px 24px;border-radius:16px;border:1px solid var(--bd);
  background:var(--card);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;
  color:var(--tx);cursor:pointer;display:flex;align-items:center;gap:14px;
  transition:all .15s;letter-spacing:.2px;
}
.land-btn:active{background:var(--card2);transform:scale(.98)}
.land-btn.primary{background:var(--accent);border-color:var(--accent);color:#000}
.land-btn.primary:active{background:#16a34a}
.land-btn-icon{font-size:22px;flex-shrink:0}
.land-btn-text{text-align:left}
.land-btn-sub{font-size:11px;opacity:.6;font-weight:400;margin-top:1px}
.land-update{background:none;border:none;color:var(--mu);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'DM Sans',sans-serif;cursor:pointer;padding:8px;display:flex;align-items:center;gap:6px}
.land-dots{display:flex;gap:7px;justify-content:center;margin-bottom:36px}
.land-dot{width:8px;height:8px;border-radius:50%}

/* ══ HOME ══ */
.home{padding:0 0 24px}
.hero{background:linear-gradient(160deg,#0a1a0d 0%,#040408 55%);padding:calc(var(--st)+20px) 20px 24px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.1) 0%,transparent 70%);pointer-events:none}
.hero-date{font-size:10px;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-bottom:5px}
.hero-title{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1.1}
.hero-sub{font-size:12px;color:var(--mu);margin-top:5px}
.section{padding:20px 16px 0}
.sec-label{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-bottom:10px;font-weight:700}
.today-card{background:var(--card2);border-radius:14px;padding:13px 15px;margin-bottom:7px;display:flex;align-items:center;gap:11px;border:1px solid var(--bd);cursor:pointer}
.tbar{width:4px;border-radius:2px;align-self:stretch;min-height:30px;flex-shrink:0}
.ttitle{font-size:15px;font-weight:600;color:var(--tx)}
.twho{font-size:11px;color:var(--mu);margin-top:2px}
.today-empty{font-size:14px;color:var(--mu2);font-style:italic;padding:4px 0 8px}
.avatars{display:flex;gap:6px;flex-wrap:wrap;padding:20px 16px 0}
.av{flex:1;min-width:55px;background:var(--card);border-radius:14px;padding:11px 6px;text-align:center;border:1px solid var(--bd);cursor:pointer;transition:all .2s}
.av-e{font-size:11px;margin-bottom:4px}
.av-n{font-size:18px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:2px}
.av-l{font-size:9px;font-weight:600;color:var(--mu);letter-spacing:.5px;text-transform:uppercase}
.next-card{display:flex;gap:11px;align-items:center;background:var(--card);border-radius:13px;padding:12px 14px;margin-bottom:7px;border:1px solid var(--bd);cursor:pointer;transition:background .15s}
.next-card:active{background:var(--card2)}
.date-box{background:var(--card2);border-radius:9px;padding:6px 9px;text-align:center;flex-shrink:0;min-width:42px;border:1px solid var(--bd)}
.date-d{font-size:18px;font-weight:800;font-family:'Syne',sans-serif;line-height:1;color:var(--tx)}
.date-m{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.next-title{font-size:14px;font-weight:600;color:var(--tx)}
.next-who{font-size:11px;color:var(--mu);margin-top:2px;display:flex;align-items:center;gap:4px}
.wdot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}
.arr{color:var(--mu2);font-size:18px;margin-left:auto}

/* ══ CALENDAR ══ */
.cal{padding:14px 14px 24px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:sticky;top:0;z-index:10;background:var(--bg);padding:60px 0 12px}
.cal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.nbtn{background:var(--card2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:20px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.pill{display:flex;align-items:center;gap:3px;background:var(--card);border:1.5px solid var(--bd);border-radius:20px;padding:4px 9px;cursor:pointer;color:var(--mu);font-size:11px;font-weight:600;font-family:inherit;transition:all .15s}
.pill.on{color:#fff}
.pdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dhdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dh{text-align:center;font-size:10px;color:var(--mu);font-weight:600;padding:3px 0}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:4px 2px;cursor:pointer;color:var(--tx);font-size:13px;font-weight:500;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:all .15s}
.cd.tod{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.35);color:#22c55e}
.cd.sel{background:#22c55e;color:#000;border-color:#22c55e}
.cd.emp{background:transparent;border:none;cursor:default}
.evd{width:5px;height:5px;border-radius:50%}
.dots{display:flex;gap:1px;flex-wrap:wrap;justify-content:center}
.slabel{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:2px;color:var(--mu);text-transform:uppercase;margin:18px 0 10px;font-weight:700}
.evc{background:var(--card);border-radius:11px;padding:11px 13px;margin-bottom:6px;border-left:3px solid var(--mu);cursor:pointer;transition:background .15s}
.evc:active{background:var(--card2)}
.evt{font-weight:600;font-size:15px}
.evm{font-size:11px;color:var(--mu);margin-top:3px;display:flex;align-items:center;gap:5px}
.upi{display:flex;gap:11px;align-items:center;background:var(--card);border-radius:11px;padding:11px 13px;margin-bottom:6px;border:1px solid var(--bd);cursor:pointer;transition:background .15s}
.upi:active{background:var(--card2)}
.upbar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:30px}
.upt{font-size:14px;font-weight:600}
.upm{font-size:11px;color:var(--mu);margin-top:1px}
.add-btn{background:var(--accent);border:none;border-radius:12px;color:#000;font-size:15px;padding:14px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;width:100%;margin-top:16px}
.fbox{margin-top:16px;background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--bd)}
.flabel{font-size:10px;color:var(--mu);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.finp{width:100%;background:var(--card2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;padding:10px 12px;font-family:'DM Sans',sans-serif;margin-bottom:12px;color-scheme:dark}
.mpills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.brow{display:flex;gap:8px}
.bpri{background:var(--accent);border:none;border-radius:8px;color:#000;font-size:13px;padding:10px 16px;cursor:pointer;font-family:inherit;font-weight:700;flex:1}
.bgh{background:var(--card2);border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-size:13px;padding:10px 13px;cursor:pointer;font-family:inherit}

/* MODAL */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(6px)}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:22px 18px calc(var(--sb)+26px);width:100%;max-width:480px;margin:0 auto;border-top:1px solid var(--bd)}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mtitle{font-family:'Syne',sans-serif;font-size:19px;font-weight:800}
.mclose{background:var(--card2);border:1px solid var(--bd);border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;color:var(--mu);display:flex;align-items:center;justify-content:center}
.del-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#ef4444;font-size:13px;padding:10px 13px;cursor:pointer;font-family:inherit;font-weight:600}

@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{animation:slideUp .22s cubic-bezier(.22,1,.36,1)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-bg{animation:fadeIn .18s ease}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{display:inline-block;animation:spin .8s linear infinite}
</style>
</head>

function parseDT(v){if(!v)return null;const r=v.includes(":")?v.split(":").pop():v;const s=r.replace(/[TZ\-:]/g,"");if(s.length<8)return null;const d=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));return isNaN(d.getTime())?null:d}
function nextY(b){const d=new Date(b);d.setFullYear(NOW.getFullYear());if(d<NOW)d.setFullYear(NOW.getFullYear()+1);return d}
function mapM(s){const l=s.toLowerCase();if(/^(jason\/kerry|kerry\/jason):/.test(l))return"Kerry";if(/^(jase|jason):/.test(l))return"Jason";if(/^kerry:/.test(l))return"Kerry";if(/^(ollie\/jason|jason\/ollie):/.test(l))return"Oliver";if(/\blouis\b/.test(l))return"Louis";if(/\bhugo\b/.test(l))return"Hugo";if(/\bleafy\b/.test(l))return"Oliver";return"All"}
function cTitle(s){return s.replace(/^(all|jason\/kerry|kerry\/jason|ollie\/jason|jason|kerry|ollie):\s*/i,"").replace(/\\,/g,",").replace(/\\n/g," ").trim()}
function parseIcal(txt){
  const un=txt.replace(/\r\n[ \t]/g,"").replace(/\n[ \t]/g,"");
  const bl=un.split("BEGIN:VEVENT").slice(1);const out=[];const seen=new Set();
  for(const b of bl){
    const p={};
    for(const ln of b.split("END:VEVENT")[0].split(/\r?\n/)){const ci=ln.indexOf(":");if(ci<0)continue;const k=ln.slice(0,ci).split(";")[0].toUpperCase();if(!p[k])p[k]=ln.slice(ci+1);}
    if(!p.SUMMARY||!p.DTSTART)continue;
    const rr=p.RRULE||"";let base=parseDT(p.DTSTART);if(!base)continue;
    let dt=rr.includes("FREQ=YEARLY")?nextY(base):base;if(!dt||dt<NOW)continue;
    if(p.EXDATE){const ex=parseDT(p.EXDATE);if(ex&&fmt(ex)===fmt(dt))continue;}
    const ds=fmt(dt),title=cTitle(p.SUMMARY),key=ds+title;
    if(seen.has(key))continue;seen.add(key);
    out.push({id:p.UID||"c"+Math.random().toString(36).slice(2),title,date:ds,member:mapM(p.SUMMARY),source:"cozi"});
  }
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}

async function fetchLive(){
  for(const pFn of PROXIES){
    try{
      const r=await Promise.race([fetch(pFn(COZI),{cache:"no-store"}),new Promise((_,rej)=>setTimeout(()=>rej(),8000))]);
      if(!r.ok)continue;
      const ct=r.headers.get("content-type")||"";
      let txt=ct.includes("json")?(await r.json()).contents||"":await r.text();
      if(!txt||!txt.includes("VCALENDAR"))continue;
      const parsed=parseIcal(txt);
      if(parsed.length>0){set({events:parsed});return;}
    }catch(e){continue;}
  }
}

function hardRefresh(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      Promise.all(regs.map(r=>r.unregister())).then(()=>caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k))).then(()=>window.location.reload(true))));
    });
  }else window.location.reload(true);
}

  const selEvs=selStr?all.filter(e=>e.date===selStr):[];
  const upc=all.filter(e=>e.date>=TD&&matchF(e,filter)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10);
  const pills=["All",...MB].map(n=>{const on=filter===n;const c=C[n]||C.All;return`<button class="pill${on?" on":""}" data-a="filter" data-m="${n}" style="${on?`border-color:${c};background:${c}18;color:${c}`:""}"><span class="pdot" style="background:${c}"></span>${n}</button>`;}).join("");
  let grid=Array.from({length:first},()=>'<div class="cd emp"></div>').join("");
  grid+=Array.from({length:di},(_,i)=>{const day=i+1,isT=isCur&&day===NOW.getDate(),isSel=day===sel;const de=dEvs(day);return`<button class="cd${isT?" tod":""}${isSel?" sel":""}" data-a="day" data-d="${day}"><span style="font-weight:${isT?"700":"400"}">${day}</span><div class="dots">${de.slice(0,4).map(e=>`<div class="evd" style="background:${primCol(e)}"></div>`).join("")}</div></button>`;}).join("");
  const selHTML=sel?`<div class="slabel">${sel} ${MO[mo]}</div>${selEvs.length?selEvs.map(e=>`<div class="evc" data-a="open-edit" data-id="${e.id}" style="border-left-color:${primCol(e)}"><div class="evt">${e.title}</div><div class="evm">${getM(e).filter(m=>m!=="All"&&m!=="Holiday").map(m=>`<span class="wdot" style="background:${C[m]||C.All}"></span>`).join("")}<span>${getM(e).includes("All")?"Everyone":getM(e).join(" & ")}</span></div></div>`).join(""):`<div style="color:var(--mu2);font-size:13px;font-style:italic">Nothing on this day</div>`}`:"";
  const selMb=Array.isArray(S.nev.member)?S.nev.member:[];
  const nPills=MB.map(m=>{const on=selMb.includes(m);return`<button class="pill${on?" on":""}" data-a="toggle-member" data-m="${m}" style="${on?`border-color:${C[m]};background:${C[m]}20;color:${C[m]}`:""}"><span class="pdot" style="background:${C[m]}"></span>${m}</button>`;}).join("");
  const addHTML=S.showAdd?`<div class="fbox"><div style="font-size:16px;font-family:'Syne',sans-serif;font-weight:800;margin-bottom:14px">Add Event</div><div class="flabel">Title</div><input class="finp" placeholder="Event title" id="et" value="${S.nev.title}"><div class="flabel">Date</div><input class="finp" type="date" id="ed" value="${S.nev.date}"><div class="flabel">Who</div><div class="mpills">${nPills}</div><div class="brow"><button class="bpri" data-a="add">Add</button><button class="bgh" data-a="cancel">Cancel</button></div></div>`:`<button class="add-btn" data-a="show-add">+ Add Event</button>`;
  return`<div class="cal"><div class="cal-hdr"><button class="nbtn" data-a="prev">‹</button><div class="cal-title">${MO[mo]} ${y}</div><button class="nbtn" data-a="next">›</button></div><div class="pills">${pills}</div><div class="dhdr">${DA.map(d=>`<div class="dh">${d}</div>`).join("")}</div><div class="grid">${grid}</div>${selHTML}<div class="slabel">${filter!=="All"?filter+" · ":""}Upcoming</div>${upc.map(e=>{const d=new Date(e.date+"T12:00:00");return`<div class="upi" data-a="open-edit" data-id="${e.id}"><div class="upbar" style="background:${primCol(e)}"></div><div style="flex:1"><div class="upt">${e.title}</div><div class="upm">${d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})} · ${getM(e).includes("All")?"Everyone":getM(e).join(" & ")}</div></div><div class="arr">›</div></div>`;}).join("")}${addHTML}</div>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function bModal(){
  const ev=allEvs().find(e=>e.id===S.editId);if(!ev)return"";
  const ms=Array.isArray(S.edit.member)?S.edit.member:[];
  const pills=MB.map(m=>{const on=ms.includes(m);return`<button class="pill${on?" on":""}" data-a="edit-toggle-member" data-m="${m}" style="${on?`border-color:${C[m]};background:${C[m]}20;color:${C[m]}`:""}"><span class="pdot" style="background:${C[m]}"></span>${m}</button>`;}).join("");
  return`<div class="modal-bg" data-a="close-edit"><div class="modal" onclick="event.stopPropagation()"><div class="mhdr"><div class="mtitle">Edit Event</div><button class="mclose" data-a="close-edit">✕</button></div><div class="flabel">Title</div><input class="finp" id="edit-t" value="${ev.title.replace(/"/g,'&quot;')}"><div class="flabel">Date</div><input class="finp" type="date" id="edit-d" value="${S.edit.date}" style="color-scheme:dark"><div class="flabel">Who</div><div class="mpills" style="margin-bottom:14px">${pills}</div><div class="brow"><button class="bpri" data-a="save-edit">Save</button>${ev.source!=="cozi"?`<button class="del-btn" data-a="delete-event" data-id="${ev.id}">Delete</button>`:""}<button class="bgh" data-a="close-edit">Cancel</button></div></div></div>`;
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function bNav(){
  return`<nav class="nav">
    <button class="nb${S.tab==="land"?" on":""}" data-a="tab" data-tab="land"><span class="ni">🌿</span>Rascal</button>
    <button class="nb${S.tab==="home"?" on":""}" data-a="tab" data-tab="home"><span class="ni">🏠</span>Home</button>
    <button class="nb${S.tab==="calendar"?" on":""}" data-a="tab" data-tab="calendar"><span class="ni">📅</span>Calendar</button>
    <button class="nb${S.tab==="school"?" on":""}" data-a="tab" data-tab="school"><span class="ni">🏫</span>School</button>
    <button class="nb" data-a="hard-refresh"><span class="ni">↻</span>Update</button>
  </nav>`;
}

// ── HANDLE ────────────────────────────────────────────────────────────────────
function handle(e){
  const el=e.target.closest("[data-a]");if(!el)return;
  const a=el.dataset.a;
  if(a==="tab")          set({tab:el.dataset.tab,sel:null,showAdd:false});
  if(a==="goto-cal")     set({tab:"calendar",filter:el.dataset.m,sel:null});
  if(a==="prev")         S.mo===0?set({mo:11,y:S.y-1,sel:null}):set({mo:S.mo-1,sel:null});
  if(a==="next")         S.mo===11?set({mo:0,y:S.y+1,sel:null}):set({mo:S.mo+1,sel:null});
  if(a==="day")          set({sel:S.sel===+el.dataset.d?null:+el.dataset.d});
  if(a==="filter")       set({filter:S.filter===el.dataset.m?"All":el.dataset.m});
  if(a==="show-add")     set({showAdd:true});
  if(a==="cancel")       set({showAdd:false});
  if(a==="hard-refresh") hardRefresh();
  if(a==="toggle-member"){const m=el.dataset.m,cur=Array.isArray(S.nev.member)?S.nev.member:[];set({nev:{...S.nev,member:cur.includes(m)?cur.filter(x=>x!==m):[...cur,m]}});}
  if(a==="add"){const t=document.getElementById("et")?.value.trim(),d=document.getElementById("ed")?.value;if(!t||!d)return;const ms=Array.isArray(S.nev.member)?S.nev.member:[];const mem=ms.length===0?"All":ms.length===1?ms[0]:ms;set({user:[...S.user,{id:"u"+Date.now(),title:t,date:d,member:mem,source:"user"}],showAdd:false,nev:{title:"",member:[],date:""}});}
  if(a==="open-edit"){const ev=allEvs().find(e=>e.id===el.dataset.id);if(!ev)return;const ms=getM(ev).filter(m=>m!=="All"&&m!=="Holiday");set({showEdit:true,editId:el.dataset.id,edit:{title:ev.title,date:ev.date,member:ms}});}
  if(a==="close-edit")   set({showEdit:false,editId:null});
  if(a==="edit-toggle-member"){const m=el.dataset.m,cur=Array.isArray(S.edit.member)?S.edit.member:[];set({edit:{...S.edit,member:cur.includes(m)?cur.filter(x=>x!==m):[...cur,m]}});}
  if(a==="save-edit"){const t=document.getElementById("edit-t")?.value.trim(),d=document.getElementById("edit-d")?.value;if(!t||!d)return;const ms=Array.isArray(S.edit.member)?S.edit.member:[];const mem=ms.length===0?"All":ms.length===1?ms[0]:ms;const inU=S.user.find(e=>e.id===S.editId);if(inU)set({user:S.user.map(e=>e.id===S.editId?{...e,title:t,date:d,member:mem}:e),showEdit:false,editId:null});else set({user:[...S.user,{id:S.editId,title:t,date:d,member:mem,source:"edited"}],events:S.events.filter(e=>e.id!==S.editId),showEdit:false,editId:null});}
  if(a==="delete-event"){const id=el.dataset.id;set({user:S.user.filter(e=>e.id!==id),events:S.events.filter(e=>e.id!==id),showEdit:false,editId:null});}
}

render();
setTimeout(fetchLive,1500);
</script>

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    setInterval(()=>reg.update(),10000);
    reg.addEventListener('updatefound',()=>{const n=reg.installing;n.addEventListener('statechange',()=>{if(n.state==='activated')window.location.reload(true);});});
  });
  navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload(true));
}
</script>

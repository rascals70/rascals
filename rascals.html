<title>Rascal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;
  --card:#13131a;
  --card2:#1a1a24;
  --bd:rgba(255,255,255,.07);
  --tx:#f0f0f8;
  --mu:#6b6b8a;
  --mu2:#4a4a6a;
  --jason:#3b82f6;
  --kerry:#ec4899;
  --oliver:#22c55e;
  --louis:#a855f7;
  --hugo:#f59e0b;
  --all:#06b6d4;
  --holiday:#475569;
  --accent:#22c55e;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* ── BOTTOM NAV ── */
.nav{
  display:flex;flex-shrink:0;
  background:rgba(13,13,20,.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--bd);
  padding:8px 0 calc(var(--sb) + 8px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;padding:6px 0;
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  color:var(--mu);letter-spacing:.5px;text-transform:uppercase;
  transition:color .2s;
}
.nav-btn.on{color:var(--accent)}
.nav-icon{font-size:20px;line-height:1}

/* ── SCROLLABLE BODY ── */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── HOME PAGE ── */
.home{padding:0 0 24px}
.home-hero{
  background:linear-gradient(160deg,#0d1f12 0%,#0a0a0f 60%);
  padding:calc(var(--st) + 20px) 20px 24px;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(34,197,94,.12) 0%,transparent 70%);
}
.home-date{font-size:11px;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-bottom:6px;font-family:'DM Sans',sans-serif}
.home-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;letter-spacing:-1px;line-height:1}
.home-sub{font-size:13px;color:var(--mu);margin-top:4px}
.update-btn{
  position:absolute;top:calc(var(--st) + 18px);right:16px;
  background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);
  border-radius:20px;color:#22c55e;font-size:11px;font-weight:600;
  padding:5px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;
}

/* Today strip */
.today-strip{padding:20px 16px 0}
.strip-label{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:3px;color:var(--mu);text-transform:uppercase;margin-bottom:10px}
.today-empty{font-size:14px;color:var(--mu2);font-style:italic;padding:8px 0}
.today-card{
  background:var(--card2);border-radius:14px;padding:14px 16px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;
  border:1px solid var(--bd);
}
.today-bar{width:4px;border-radius:2px;align-self:stretch;min-height:32px;flex-shrink:0}
.today-title{font-size:15px;font-weight:600;color:var(--tx)}
.today-who{font-size:11px;color:var(--mu);margin-top:2px}

/* Member avatars */
.avatars{display:flex;gap:8px;padding:20px 16px 0;flex-wrap:wrap}
.avatar{
  flex:1;min-width:60px;background:var(--card);border-radius:14px;
  padding:12px 8px;text-align:center;border:1px solid var(--bd);
  cursor:pointer;transition:all .2s;
}
.avatar.on{border-color:var(--ac);background:var(--card2)}
.av-dot{width:28px;height:28px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:13px}
.av-name{font-size:10px;font-weight:600;color:var(--mu);letter-spacing:.5px;text-transform:uppercase}
.av-count{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:2px}

/* Next up */
.next-up{padding:20px 16px 0}
.next-card{
  background:var(--card);border-radius:14px;padding:14px 16px;
  margin-bottom:8px;display:flex;gap:12px;align-items:center;
  border:1px solid var(--bd);cursor:pointer;transition:background .15s;
}
.next-card:active{background:var(--card2)}
.next-date-box{
  background:var(--card2);border-radius:10px;padding:6px 10px;
  text-align:center;flex-shrink:0;min-width:44px;border:1px solid var(--bd);
}
.next-day{font-size:18px;font-weight:700;color:var(--tx);line-height:1;font-family:'Syne',sans-serif}
.next-mon{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.next-title{font-size:14px;font-weight:600;color:var(--tx)}
.next-who{font-size:11px;color:var(--mu);margin-top:2px;display:flex;align-items:center;gap:4px}
.who-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* ── CALENDAR PAGE ── */
.cal-page{padding:calc(var(--st) + 16px) 14px 24px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--tx)}
.nbtn{background:var(--card2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:20px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}

/* Filter pills */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.fpill{display:flex;align-items:center;gap:4px;background:var(--card);border:1.5px solid var(--bd);border-radius:20px;padding:4px 10px;cursor:pointer;color:var(--mu);font-size:11px;font-weight:600;font-family:inherit;transition:all .15s;letter-spacing:.3px}
.fpill.on{color:#fff}
.fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Calendar grid */
.dhdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dh{text-align:center;font-size:10px;color:var(--mu);font-weight:600;padding:3px 0;letter-spacing:.5px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cd{
  background:var(--card);border:1px solid var(--bd);border-radius:8px;
  padding:5px 2px;cursor:pointer;color:var(--tx);font-size:13px;font-weight:500;
  min-height:44px;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:inherit;transition:all .15s;
}
.cd.tod{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#22c55e}
.cd.sel{background:#22c55e;color:#000;border-color:#22c55e}
.cd.emp{background:transparent;border:none;cursor:default}
.dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center}
.evd{width:5px;height:5px;border-radius:50%}

/* Selected day */
.sel-panel{margin-top:16px}
.panel-label{font-family:'Syne',sans-serif;font-size:11px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:700}
.evc{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:7px;border-left:3px solid var(--mu);cursor:pointer;transition:background .15s}
.evc:active{background:var(--card2)}
.evt{font-weight:600;font-size:15px;color:var(--tx)}
.evm{font-size:11px;color:var(--mu);margin-top:3px;display:flex;align-items:center;gap:6px}

/* Upcoming */
.upc-list{margin-top:20px}
.upi{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;
  border:1px solid var(--bd);transition:background .15s;
}
.upi:active{background:var(--card2)}
.upbar{width:4px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:32px}
.upt{font-size:14px;font-weight:600;color:var(--tx)}
.upm{font-size:11px;color:var(--mu);margin-top:2px}
.arr{color:var(--mu2);font-size:16px;margin-left:auto;padding-left:4px}

/* Add button */
.add-btn{
  background:var(--accent);border:none;border-radius:12px;color:#000;
  font-size:15px;padding:14px;cursor:pointer;font-family:'DM Sans',sans-serif;
  font-weight:700;width:100%;margin-top:18px;letter-spacing:.3px;
}

/* Add form */
.fbox{margin-top:18px;background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--bd)}
.flabel{font-size:11px;color:var(--mu);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.finp{
  width:100%;background:var(--card2);border:1px solid var(--bd);
  border-radius:8px;color:var(--tx);font-size:14px;padding:10px 12px;
  font-family:'DM Sans',sans-serif;margin-bottom:12px;color-scheme:dark;
}
.mpills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.brow{display:flex;gap:8px}
.bpri{background:var(--accent);border:none;border-radius:8px;color:#000;font-size:13px;padding:10px 18px;cursor:pointer;font-family:inherit;font-weight:700;flex:1}
.bghost{background:var(--card2);border:1px solid var(--bd);border-radius:8px;color:var(--mu);font-size:13px;padding:10px 14px;cursor:pointer;font-family:inherit}

/* ── EDIT MODAL ── */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px 18px calc(var(--sb) + 28px);width:100%;max-width:480px;margin:0 auto;border-top:1px solid var(--bd)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--tx)}
.modal-close{background:var(--card2);border:1px solid var(--bd);border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--mu);display:flex;align-items:center;justify-content:center}
.del-btn{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);border-radius:8px;color:#ef4444;font-size:13px;padding:10px 14px;cursor:pointer;font-family:inherit;font-weight:600}

@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{animation:slideUp .25s cubic-bezier(.32,0,.67,0)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-bg{animation:fadeIn .2s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulsing{animation:pulse 1s infinite}
</style>

  nev:{title:"",member:[],date:""},
  edit:{title:"",member:[],date:""},
  sync:"embedded",lastSync:null,liveCount:0
};

function set(p){Object.assign(S,p);render()}
function allEvs(){return[...S.events,...S.user]}
function col(m){return C[m]||C.All}
function getMembers(e){if(Array.isArray(e.member))return e.member;if(e.member==="All")return["All"];return[e.member]}
function primaryColor(e){const ms=getMembers(e);const f=ms.find(m=>m!=="All"&&m!=="Holiday");return C[f||ms[0]]||C.All}
function matchesFilter(e,f){if(f==="All")return true;const ms=getMembers(e);return ms.includes(f)||ms.includes("All")}
function fmtD(ds){const d=new Date(ds+"T12:00:00");return d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}

// iCal parser
function parseDT(v){if(!v)return null;const r=v.includes(":")?v.split(":").pop():v;const s=r.replace(/[TZ\-:]/g,"");if(s.length<8)return null;const d=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));return isNaN(d.getTime())?null:d}
function nextY(base){const d=new Date(base);d.setFullYear(NOW.getFullYear());if(d<NOW)d.setFullYear(NOW.getFullYear()+1);return d}
function mapM(s){const l=s.toLowerCase();if(/^(jason\/kerry|kerry\/jason):/.test(l))return"Kerry";if(/^(jase|jason):/.test(l))return"Jason";if(/^kerry:/.test(l))return"Kerry";if(/^(ollie\/jason|jason\/ollie):/.test(l))return"Oliver";if(/\blouis\b/.test(l))return"Louis";if(/\bhugo\b/.test(l))return"Hugo";if(/\bleafy\b/.test(l))return"Oliver";return"All"}
function cTitle(s){return s.replace(/^(all|jason\/kerry|kerry\/jason|ollie\/jason|jason|kerry|ollie):\s*/i,"").replace(/\\,/g,",").replace(/\\n/g," ").trim()}
function parseIcal(txt){
  const un=txt.replace(/\r\n[ \t]/g,"").replace(/\n[ \t]/g,"");
  const bl=un.split("BEGIN:VEVENT").slice(1);const out=[];const seen=new Set();
  for(const b of bl){
    const p={};
    for(const ln of b.split("END:VEVENT")[0].split(/\r?\n/)){const ci=ln.indexOf(":");if(ci<0)continue;const k=ln.slice(0,ci).split(";")[0].toUpperCase();if(!p[k])p[k]=ln.slice(ci+1);}
    if(!p.SUMMARY||!p.DTSTART)continue;
    const rr=p.RRULE||"";let base=parseDT(p.DTSTART);if(!base)continue;
    let dt=rr.includes("FREQ=YEARLY")?nextY(base):base;if(!dt||dt<NOW)continue;
    if(p.EXDATE){const ex=parseDT(p.EXDATE);if(ex&&fmt(ex)===fmt(dt))continue;}
    const ds=fmt(dt),title=cTitle(p.SUMMARY),key=ds+title;
    if(seen.has(key))continue;seen.add(key);
    out.push({id:p.UID||"c"+Math.random().toString(36).slice(2),title,date:ds,member:mapM(p.SUMMARY),source:"cozi"});
  }
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}

async function fetchLive(){
  set({sync:"loading"});
  for(const pFn of PROXIES){
    try{
      const r=await Promise.race([fetch(pFn(COZI_URL),{cache:"no-store"}),new Promise((_,rej)=>setTimeout(()=>rej(),8000))]);
      if(!r.ok)continue;
      const ct=r.headers.get("content-type")||"";
      let txt=ct.includes("json")?(await r.json()).contents||"":await r.text();
      if(!txt||!txt.includes("VCALENDAR"))continue;
      const parsed=parseIcal(txt);
      if(parsed.length>0){set({events:parsed,sync:"live",lastSync:new Date(),liveCount:parsed.length});return;}
    }catch(e){continue;}
  }
  set({sync:"embedded"});
}

function hardRefresh(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      Promise.all(regs.map(r=>r.unregister())).then(()=>{
        caches.keys().then(keys=>{
          Promise.all(keys.map(k=>caches.delete(k))).then(()=>window.location.reload(true));
        });
      });
    });
  }else{window.location.reload(true);}
}

function getDaysIn(y,m){return new Date(y,m+1,0).getDate()}
function getFirstDay(y,m){const d=new Date(y,m,1).getDay();return d===0?6:d-1}

// ── RENDER ──
function render(){
  document.getElementById("app").innerHTML=buildPage();
  document.getElementById("app").addEventListener("click",handle);
}

function buildPage(){
  const bodyHTML = S.tab==="home" ? buildHome() : buildCal();
  return `
    <div class="body">${bodyHTML}</div>
    ${buildNav()}
    ${S.showEdit ? buildEditModal() : ""}
  `;
}

function buildNav(){
  return `<nav class="nav">
    <button class="nav-btn${S.tab==="home"?" on":""}" data-a="tab" data-tab="home">
      <span class="nav-icon">🏠</span>Home
    </button>
    <button class="nav-btn${S.tab==="calendar"?" on":""}" data-a="tab" data-tab="calendar">
      <span class="nav-icon">📅</span>Calendar
    </button>
    <button class="nav-btn" data-a="hard-refresh">
      <span class="nav-icon${S.sync==="loading"?" pulsing":""}">↻</span>Update
    </button>
  </nav>`;
}

function buildHome(){
  const all=allEvs();
  const todayEvs=all.filter(e=>e.date===TODAY);
  const upcoming=all.filter(e=>e.date>TODAY).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);
  const memberCounts=MEMBERS.map(m=>({
    name:m,color:C[m],
    count:all.filter(e=>e.date>=TODAY&&matchesFilter(e,m)).length
  }));

  const todayHTML=todayEvs.length===0
    ?`<div class="today-empty">Nothing on today 🌿</div>`
    :todayEvs.map(e=>`
      <div class="today-card" data-a="open-edit" data-id="${e.id}" style="cursor:pointer">
        <div class="today-bar" style="background:${primaryColor(e)}"></div>
        <div style="flex:1">
          <div class="today-title">${e.title}</div>
          <div class="today-who">${getMembers(e).join(" & ")}</div>
        </div>
      </div>`).join("");

  const upcomingHTML=upcoming.map(e=>{
    const d=new Date(e.date+"T12:00:00");
    const ms=getMembers(e);
    const whoDots=ms.filter(m=>m!=="All"&&m!=="Holiday").map(m=>`<span class="who-dot" style="background:${C[m]||C.All}"></span>`).join("");
    return`<div class="next-card" data-a="open-edit" data-id="${e.id}">
      <div class="next-date-box">
        <div class="next-day">${d.getDate()}</div>
        <div class="next-mon">${MONTHS_S[d.getMonth()]}</div>
      </div>
      <div style="flex:1">
        <div class="next-title">${e.title}</div>
        <div class="next-who">${whoDots}<span>${ms.includes("All")?"Everyone":ms.join(" & ")}</span></div>
      </div>
      <div class="arr">›</div>
    </div>`;
  }).join("");

  const avatarHTML=memberCounts.map(m=>`
    <div class="avatar" data-a="goto-cal" data-m="${m.name}" style="--ac:${m.color}">
      <div class="av-dot" style="background:${m.color}20;color:${m.color}">
        ${m.name==="Hugo"?"🐾":m.name[0]}
      </div>
      <div class="av-count" style="color:${m.color}">${m.count}</div>
      <div class="av-name">${m.name}</div>
    </div>`).join("");

  return`<div class="home">
    <div class="home-hero">
      <div class="home-date">${NOW.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
      <div class="home-title">The Leaf<br>Family</div>
      <div class="home-sub">Cookham · 5 Rascals + Hugo 🐾</div>
    </div>
    <div class="today-strip">
      <div class="strip-label">Today</div>
      ${todayHTML}
    </div>
    <div class="avatars">${avatarHTML}</div>
    <div class="next-up">
      <div class="strip-label" style="margin-top:0">Coming up</div>
      ${upcomingHTML}
    </div>
  </div>`;
}

function buildCal(){
  const{y,mo,sel,filter}=S;
  const all=allEvs();
  const di=getDaysIn(y,mo),fd=getFirstDay(y,mo);
  const isCurM=mo===NOW.getMonth()&&y===NOW.getFullYear();

  function dEvs(day){
    const ds=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    return all.filter(e=>e.date===ds&&(filter==="All"||e.member===filter||e.member==="All"||e.member==="Holiday"||matchesFilter(e,filter)));
  }

  const selStr=sel?y+"-"+String(mo+1).padStart(2,"0")+"-"+String(sel).padStart(2,"0"):null;
  const selEvs=selStr?all.filter(e=>e.date===selStr):[];
  const upcoming=all.filter(e=>e.date>=TODAY&&matchesFilter(e,filter)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10);

  const pills=["All",...MEMBERS].map(n=>{
    const on=filter===n;const c=C[n]||C.All;
    return`<button class="fpill${on?" on":""}" data-a="filter" data-m="${n}" style="${on?`border-color:${c};background:${c}20;color:${c}`:""}"><span class="fdot" style="background:${c}"></span>${n}</button>`;
  }).join("");

  let grid=Array.from({length:fd},()=>'<div class="cd emp"></div>').join("");
  grid+=Array.from({length:di},(_,i)=>{
    const day=i+1,isT=isCurM&&day===NOW.getDate(),isSel=day===sel;
    const de=dEvs(day);
    return`<button class="cd${isT?" tod":""}${isSel?" sel":""}" data-a="day" data-d="${day}">
      <span style="font-weight:${isT?"700":"500"}">${day}</span>
      <div class="dots">${de.slice(0,4).map(e=>`<div class="evd" style="background:${primaryColor(e)}"></div>`).join("")}</div>
    </button>`;
  }).join("");

  const selHTML=sel?`
    <div class="sel-panel">
      <div class="panel-label">${sel} ${MONTHS[mo]}</div>
      ${selEvs.length===0?'<div style="color:var(--mu2);font-size:14px;font-style:italic">Nothing on this day</div>':
        selEvs.map(e=>`<div class="evc" data-a="open-edit" data-id="${e.id}" style="border-left-color:${primaryColor(e)}">
          <div class="evt">${e.title}</div>
          <div class="evm">
            ${getMembers(e).filter(m=>m!=="All"&&m!=="Holiday").map(m=>`<span class="who-dot" style="background:${C[m]||C.All}"></span>`).join("")}
            <span>${getMembers(e).includes("All")?"Everyone":getMembers(e).join(" & ")}</span>
          </div>
        </div>`).join("")}
    </div>`:"";

  const upcHTML=`<div class="upc-list">
    <div class="panel-label">${filter!=="All"?filter+" · ":""}Upcoming</div>
    ${upcoming.map(e=>{
      const d=new Date(e.date+"T12:00:00");
      return`<div class="upi" data-a="open-edit" data-id="${e.id}">
        <div class="upbar" style="background:${primaryColor(e)}"></div>
        <div style="flex:1">
          <div class="upt">${e.title}</div>
          <div class="upm">${d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})} · ${getMembers(e).includes("All")?"Everyone":getMembers(e).join(" & ")}</div>
        </div>
        <div class="arr">›</div>
      </div>`;
    }).join("")}
  </div>`;

  const selM=Array.isArray(S.nev.member)?S.nev.member:[];
  const newPills=MEMBERS.map(m=>{
    const on=selM.includes(m);
    return`<button class="fpill${on?" on":""}" data-a="toggle-member" data-m="${m}" style="${on?`border-color:${C[m]};background:${C[m]}30;color:${C[m]}`:""}"><span class="fdot" style="background:${C[m]}"></span>${m}</button>`;
  }).join("");

  const addHTML=S.showAdd?`<div class="fbox">
    <div style="font-size:16px;font-family:'Syne',sans-serif;font-weight:800;color:var(--tx);margin-bottom:14px">Add Event</div>
    <div class="flabel">Title</div>
    <input class="finp" placeholder="Event title" id="et" value="${S.nev.title}">
    <div class="flabel">Date</div>
    <input class="finp" type="date" id="ed" value="${S.nev.date}">
    <div class="flabel">Who</div>
    <div class="mpills">${newPills}</div>
    <div class="brow">
      <button class="bpri" data-a="add">Add event</button>
      <button class="bghost" data-a="cancel">Cancel</button>
    </div>
  </div>`:`<button class="add-btn" data-a="show-add">+ Add Event</button>`;

  return`<div class="cal-page">
    <div class="cal-hdr">
      <button class="nbtn" data-a="prev">‹</button>
      <div class="cal-title">${MONTHS[mo]} ${y}</div>
      <button class="nbtn" data-a="next">›</button>
    </div>
    <div class="filter-row">${pills}</div>
    <div class="dhdr">${DAYS.map(d=>`<div class="dh">${d}</div>`).join("")}</div>
    <div class="grid">${grid}</div>
    ${selHTML}
    ${upcHTML}
    ${addHTML}
  </div>`;
}

function buildEditModal(){
  const ev=allEvs().find(e=>e.id===S.editId);
  if(!ev)return"";
  const ms=Array.isArray(S.edit.member)?S.edit.member:[];
  const pills=MEMBERS.map(m=>{
    const on=ms.includes(m);
    return`<button class="fpill${on?" on":""}" data-a="edit-toggle-member" data-m="${m}" style="${on?`border-color:${C[m]};background:${C[m]}30;color:${C[m]}`:""}"><span class="fdot" style="background:${C[m]}"></span>${m}</button>`;
  }).join("");
  return`<div class="modal-bg" data-a="close-edit">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-hdr">
        <div class="modal-title">Edit Event</div>
        <button class="modal-close" data-a="close-edit">✕</button>
      </div>
      <div class="flabel">Title</div>
      <input class="finp" id="edit-t" value="${ev.title.replace(/"/g,'&quot;')}">
      <div class="flabel">Date</div>
      <input class="finp" type="date" id="edit-d" value="${S.edit.date}" style="color-scheme:dark">
      <div class="flabel">Who</div>
      <div class="mpills" style="margin-bottom:16px">${pills}</div>
      <div class="brow">
        <button class="bpri" data-a="save-edit">Save</button>
        ${ev.source!=="cozi"?`<button class="del-btn" data-a="delete-event" data-id="${ev.id}">Delete</button>`:""}
        <button class="bghost" data-a="close-edit">Cancel</button>
      </div>
    </div>
  </div>`;
}

function handle(e){
  const el=e.target.closest("[data-a]");if(!el)return;
  const a=el.dataset.a;
  if(a==="tab")          set({tab:el.dataset.tab,sel:null,showAdd:false});
  if(a==="goto-cal")     set({tab:"calendar",filter:el.dataset.m,sel:null});
  if(a==="prev")         S.mo===0?set({mo:11,y:S.y-1,sel:null}):set({mo:S.mo-1,sel:null});
  if(a==="next")         S.mo===11?set({mo:0,y:S.y+1,sel:null}):set({mo:S.mo+1,sel:null});
  if(a==="day")          set({sel:S.sel===+el.dataset.d?null:+el.dataset.d});
  if(a==="filter")       set({filter:S.filter===el.dataset.m?"All":el.dataset.m});
  if(a==="show-add")     set({showAdd:true});
  if(a==="cancel")       set({showAdd:false});
  if(a==="hard-refresh") hardRefresh();
  if(a==="toggle-member"){
    const m=el.dataset.m,cur=Array.isArray(S.nev.member)?S.nev.member:[];
    set({nev:{...S.nev,member:cur.includes(m)?cur.filter(x=>x!==m):[...cur,m]}});
  }
  if(a==="add"){
    const t=document.getElementById("et")?.value.trim(),d=document.getElementById("ed")?.value;
    if(!t||!d)return;
    const ms=Array.isArray(S.nev.member)?S.nev.member:[];
    const mem=ms.length===0?"All":ms.length===1?ms[0]:ms;
    set({user:[...S.user,{id:"u"+Date.now(),title:t,date:d,member:mem,source:"user"}],showAdd:false,nev:{title:"",member:[],date:""}});
  }
  if(a==="open-edit"){
    const ev=allEvs().find(e=>e.id===el.dataset.id);if(!ev)return;
    const ms=getMembers(ev).filter(m=>m!=="All"&&m!=="Holiday");
    set({showEdit:true,editId:el.dataset.id,edit:{title:ev.title,date:ev.date,member:ms}});
  }
  if(a==="close-edit")   set({showEdit:false,editId:null});
  if(a==="edit-toggle-member"){
    const m=el.dataset.m,cur=Array.isArray(S.edit.member)?S.edit.member:[];
    set({edit:{...S.edit,member:cur.includes(m)?cur.filter(x=>x!==m):[...cur,m]}});
  }
  if(a==="save-edit"){
    const t=document.getElementById("edit-t")?.value.trim(),d=document.getElementById("edit-d")?.value;
    if(!t||!d)return;
    const ms=Array.isArray(S.edit.member)?S.edit.member:[];
    const mem=ms.length===0?"All":ms.length===1?ms[0]:ms;
    const inUser=S.user.find(e=>e.id===S.editId);
    if(inUser){set({user:S.user.map(e=>e.id===S.editId?{...e,title:t,date:d,member:mem}:e),showEdit:false,editId:null});}
    else{set({user:[...S.user,{id:S.editId,title:t,date:d,member:mem,source:"edited"}],events:S.events.filter(e=>e.id!==S.editId),showEdit:false,editId:null});}
  }
  if(a==="delete-event"){
    const id=el.dataset.id;
    set({user:S.user.filter(e=>e.id!==id),events:S.events.filter(e=>e.id!==id),showEdit:false,editId:null});
  }
}

render();
setTimeout(fetchLive,1000);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(reg=>{
    setInterval(()=>reg.update(),10000);
    reg.addEventListener('updatefound',()=>{
      const n=reg.installing;
      n.addEventListener('statechange',()=>{if(n.state==='activated')window.location.reload(true);});
    });
  });
  navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload(true));
}
</script>

const NOW=new Date();NOW.setHours(0,0,0,0);
function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}

// iCal parser
function parseDT(v){
  if(!v)return null;
  const r=v.includes(":")?v.split(":").pop():v;
  const s=r.replace(/[TZ\-:]/g,"");
  if(s.length<8)return null;
  const d=new Date(+s.slice(0,4),+s.slice(4,6)-1,+s.slice(6,8));
  return isNaN(d.getTime())?null:d;
}
function nextY(base){
  const d=new Date(base);d.setFullYear(NOW.getFullYear());
  if(d<NOW)d.setFullYear(NOW.getFullYear()+1);
  return d;
}
function mapM(s){
  const l=s.toLowerCase();
  if(/^(jason\/kerry|kerry\/jason):/.test(l))return"Kerry";
  if(/^(jase|jason):/.test(l))return"Jason";
  if(/^kerry:/.test(l))return"Kerry";
  if(/^(ollie\/jason|jason\/ollie):/.test(l))return"Oliver";
  if(/\blouis\b/.test(l))return"Louis";
  if(/\bhugo\b/.test(l))return"Hugo";
  if(/\bleafy\b/.test(l))return"Oliver";
  return"All";
}
function cTitle(s){return s.replace(/^(all|jason\/kerry|kerry\/jason|ollie\/jason|jason|kerry|ollie):\s*/i,"").replace(/\\,/g,",").replace(/\\n/g," ").trim()}
function parseIcal(txt){
  const un=txt.replace(/\r\n[ \t]/g,"").replace(/\n[ \t]/g,"");
  const bl=un.split("BEGIN:VEVENT").slice(1);
  const out=[];const seen=new Set();
  for(const b of bl){
    const p={};
    for(const ln of b.split("END:VEVENT")[0].split(/\r?\n/)){
      const ci=ln.indexOf(":");if(ci<0)continue;
      const k=ln.slice(0,ci).split(";")[0].toUpperCase();
      if(!p[k])p[k]=ln.slice(ci+1);
    }
    if(!p.SUMMARY||!p.DTSTART)continue;
    const rr=p.RRULE||"";
    let base=parseDT(p.DTSTART);if(!base)continue;
    let dt=rr.includes("FREQ=YEARLY")?nextY(base):base;
    if(!dt||dt<NOW)continue;
    if(p.EXDATE){const ex=parseDT(p.EXDATE);if(ex&&fmt(ex)===fmt(dt))continue;}
    const ds=fmt(dt),title=cTitle(p.SUMMARY),key=ds+title;
    if(seen.has(key))continue;seen.add(key);
    out.push({id:p.UID||"c"+Math.random().toString(36).slice(2),title,date:ds,member:mapM(p.SUMMARY),source:"cozi"});
  }
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}

// Live fetch — tries 3 proxies silently in background
async function fetchLive(){
  set({sync:"loading"});
  for(const proxyFn of PROXIES){
    try{
      const url=proxyFn(COZI_URL);
      const r=await Promise.race([fetch(url,{cache:"no-store"}),new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout")),8000))]);
      if(!r.ok)continue;
      let txt;
      const ct=r.headers.get("content-type")||"";
      if(ct.includes("json")){const j=await r.json();txt=j.contents||j.data||"";}
      else{txt=await r.text();}
      if(!txt||!txt.includes("VCALENDAR"))continue;
      const parsed=parseIcal(txt);
      if(parsed.length>0){
        set({events:parsed,sync:"live",lastSync:new Date(),liveCount:parsed.length});
        return;
      }
    }catch(e){continue;}
  }
  // All proxies failed — keep embedded data, show status
  set({sync:"embedded"});
}

function daysIn(y,m){return new Date(y,m+1,0).getDate()}
function firstD(y,m){const d=new Date(y,m,1).getDay();return d===0?6:d-1}

function render(){
  document.getElementById("app").innerHTML=buildApp();
  document.getElementById("app").addEventListener("click",handle);
}

function buildApp(){
  const sc=S.sync;
  const scol={embedded:"#0891b2",loading:"#d97706",live:"#16a34a",error:"#ef4444"}[sc];
  const sico={embedded:"📦",loading:'<span class="spinning">⟳</span>',live:"●",error:"⚠"}[sc];
  const slbl={
    embedded:`${S.events.length} events (embedded)`,
    loading:"Syncing live\u2026",
    live:`${S.liveCount} events · live${S.lastSync?" · "+S.lastSync.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):""}`,
    error:"Sync failed"
  }[sc];
  const pills=Object.entries(COLORS).filter(([k])=>k!=="Holiday").map(([n,c])=>{
    const on=S.filter===n;
    return`<button class="pill" data-a="filter" data-m="${n}" style="border-color:${on?c:"rgba(255,255,255,.12)"};color:${on?"#fff":""}"><span class="dot" style="background:${c}"></span>${n}</button>`;
  }).join("");
  return`<div class="hdr">
    <div class="hdr-sub">${NOW.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</div>
    <div class="hdr-title">The Leaf Family</div>
    <div class="pills">${pills}</div>
    <div class="sync-row">
      <button class="sync-info" data-a="sync" style="color:${scol}">${sico} Cozi ${slbl}</button>
      ${sc!=="loading"?`<button style="font-size:11px;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);border-radius:6px;color:#fff;padding:3px 10px;cursor:pointer;font-family:inherit" data-a="sync">↻ Refresh</button>`:""}
    </div>
  </div>
  <div class="tabs">
    <button class="tab${S.tab==="calendar"?" on":""}" data-a="tab" data-tab="calendar">📅 Calendar</button>
    <button class="tab${S.tab==="hugo"?" on":""}" data-a="tab" data-tab="hugo">🐶 Hugo</button>
  </div>
  <div class="body">${S.tab==="calendar"?buildCal():buildHugo()}</div>`;
}

function buildCal(){
  const{y,mo,sel,filter}=S;
  const all=allEvs();
  const di=daysIn(y,mo),fd=firstD(y,mo);
  const isCurM=mo===NOW.getMonth()&&y===NOW.getFullYear();
  function dEvs(day){
    const ds=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
    return all.filter(e=>e.date===ds&&(matchesFilter(e,filter)||getMembers(e).includes("Holiday")));
  }
  const selStr=sel?y+"-"+String(mo+1).padStart(2,"0")+"-"+String(sel).padStart(2,"0"):null;
  const selEvs=selStr?all.filter(e=>e.date===selStr):[];
  const upc=all.filter(e=>e.date>=TODAY&&matchesFilter(e,filter)).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10);
  let grid=Array.from({length:fd},()=>'<div class="cd emp"></div>').join("");
  grid+=Array.from({length:di},(_,i)=>{
    const day=i+1,isT=isCurM&&day===NOW.getDate(),isSel=day===sel;
    const de=dEvs(day);
    return`<button class="cd${isT?" tod":""}${isSel?" sel":""}" data-a="day" data-d="${day}"><span style="font-weight:${isT?"bold":"normal"}">${day}</span><div class="dots">${de.slice(0,4).map(e=>`<div class="evd" style="background:${primaryColor(e)}"></div>`).join("")}</div></button>`;
  }).join("");
  const selHTML=sel?`<div class="slbl">${sel} ${MONTHS[mo]}</div>`+(selEvs.length===0?'<div style="color:var(--mu);font-size:13px;font-style:italic">Nothing on this day</div>':selEvs.map(e=>`<div class="evc" data-a="open-edit" data-id="${e.id}" style="border-left-color:${primaryColor(e)};cursor:pointer"><div class="evt">${e.title}</div><div class="evm">${getMembers(e).join(" & ")}${e.source==="cozi"?' · <span style="color:var(--cal)">Cozi</span>':''}${e.source==="user"?' · <span style="color:var(--louis)">Added</span>':''}</div></div>`).join("")):"";
  // Edit modal
  const editEv=S.editId?allEvs().find(e=>e.id===S.editId):null;
  const editSelM=Array.isArray(S.edit.member)?S.edit.member:S.edit.member?[S.edit.member]:[];
  const editPills=MEMBERS.filter(m=>m!=="All").map(m=>{
    const on=editSelM.includes(m);
    return`<button class="pill${on?' on':''}" data-a="edit-toggle-member" data-m="${m}" style="${on?'background:'+COLORS[m]+';border-color:'+COLORS[m]+';color:#fff':''}" ><span class="dot" style="background:${on?'#fff':COLORS[m]}"></span>${m}</button>`;
  }).join("");
  const editHTML=S.showEdit&&editEv?`<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end">
    <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom,0px) + 24px);width:100%;max-width:480px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:17px;font-weight:700;color:#0f172a">Edit Event</div>
        <button data-a="close-edit" style="background:#f1f5f9;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:#64748b">✕</button>
      </div>
      <input class="finp" placeholder="Event title" id="edit-t" value="${S.edit.title}" style="color:#0f172a">
      <input class="finp" type="date" id="edit-d" value="${S.edit.date}" style="color:#0f172a;color-scheme:light">
      <div style="font-size:11px;color:#64748b;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Who</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px">${editPills}</div>
      <div style="display:flex;gap:8px">
        <button class="bpri" data-a="save-edit" style="flex:1;padding:12px">Save</button>
        ${editEv.source!=="cozi"?`<button style="background:#fee2e2;border:1px solid #fecaca;border-radius:8px;color:#dc2626;font-size:13px;padding:10px 14px;cursor:pointer;font-family:inherit;font-weight:600" data-a="delete-event" data-id="${editEv.id}">Delete</button>`:''}
        <button class="bghost" data-a="close-edit">Cancel</button>
      </div>
    </div>
  </div>`:"";

  const selM=Array.isArray(S.nev.member)?S.nev.member:[S.nev.member];
  const memberPills=MEMBERS.filter(m=>m!=="All").map(m=>{
    const on=selM.includes(m);
    return`<button class="pill${on?' on':''}" data-a="toggle-member" data-m="${m}" style="${on?'background:'+COLORS[m]+';border-color:'+COLORS[m]+';color:#fff':''}" ><span class="dot" style="background:${on?'#fff':COLORS[m]}"></span>${m}</button>`;
  }).join("");
  const addHTML=S.showAdd?`<div class="fbox"><div style="font-size:14px;font-weight:700;margin-bottom:10px;color:#0f172a">Add Event</div><input class="finp" placeholder="Event title" id="et" value="${S.nev.title}"><input class="finp" type="date" id="ed" value="${S.nev.date}" style="color:#0f172a"><div style="font-size:11px;color:#64748b;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Who</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${memberPills}</div><div class="brow"><button class="bpri" data-a="add">Add</button><button class="bghost" data-a="cancel">Cancel</button></div></div>`:`<button class="abtn" data-a="show-add">+ Add Event</button>`;
  return`<div class="sec">
    <div class="mnav"><button class="nbtn" data-a="prev">‹</button><div class="mtitle">${MONTHS[mo]} ${y}</div><button class="nbtn" data-a="next">›</button></div>
    <div class="dhdr">${DAYS.map(d=>`<div class="dh">${d}</div>`).join("")}</div>
    <div class="grid">${grid}</div>
    ${selHTML}
    <div class="slbl">${filter!=="All"?filter+" · ":""}Upcoming (${upc.length})</div>
    ${upc.map(e=>`<div class="upi" data-a="open-edit" data-id="${e.id}" style="cursor:pointer"><div class="upbar" style="background:${primaryColor(e)}"></div><div style="flex:1"><div class="upt">${e.title}</div><div class="upm">${fmtD(e.date)} · ${getMembers(e).join(" & ")}</div></div><div style="color:#cbd5e1;font-size:18px;padding-left:4px">›</div></div>`).join("")}
    ${addHTML}
  </div>${editHTML}`;
}

function buildHugo(){
  const done=S.hugo.filter(t=>t.done).length,total=S.hugo.length;
  return`<div class="sec">
    <div class="hhdr">
      <div style="font-size:25px;margin-bottom:3px">🐾</div>
      <div style="font-size:18px;font-weight:bold;color:#92400e">Hugo</div>
      <div style="font-size:12px;color:#b45309">Black Lab · ~15 weeks · Cookham</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-top:9px;margin-bottom:3px"><span>Today's tasks</span><span style="color:${done===total?"#16a34a":"#d97706"}">${done}/${total}</span></div>
      <div class="pbar"><div class="pfill" style="width:${(done/total)*100}%;background:${done===total?"#16a34a":"#d97706"}"></div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:9px"><button class="bghost" data-a="reset">Reset day</button></div>
    ${S.hugo.map(t=>`<button class="tbtn${t.done?" done":""}" data-a="tog" data-id="${t.id}"><span style="font-size:19px;flex-shrink:0">${t.icon}</span><div style="flex:1"><div class="tnm">${t.task}</div><div class="ttm">${t.time}</div></div><div class="chk${t.done?" done":""}">${t.done?"✓":""}</div></button>`).join("")}
    ${done===total?`<div class="cbanner"><div style="font-size:28px">🐕</div><div style="font-size:14px;font-weight:bold;margin-top:5px;color:#16a34a">Hugo's had a great day!</div><div style="font-size:12px;color:var(--mu);margin-top:2px">All tasks complete</div></div>`:""}
  </div>`;
}

function handle(e){
  const el=e.target.closest("[data-a]");if(!el)return;
  const a=el.dataset.a;
  if(a==="tab")     set({tab:el.dataset.tab,sel:null});
  if(a==="prev")    S.mo===0?set({mo:11,y:S.y-1,sel:null}):set({mo:S.mo-1,sel:null});
  if(a==="next")    S.mo===11?set({mo:0,y:S.y+1,sel:null}):set({mo:S.mo+1,sel:null});
  if(a==="day")     set({sel:S.sel===+el.dataset.d?null:+el.dataset.d});
  if(a==="filter")  set({filter:S.filter===el.dataset.m?"All":el.dataset.m});
  if(a==="sync")    fetchLive();
  if(a==="show-add")set({showAdd:true});
  if(a==="cancel")  set({showAdd:false});
  if(a==="open-edit"){
    const ev=allEvs().find(e=>e.id===el.dataset.id);
    if(!ev)return;
    const ms=getMembers(ev).filter(m=>m!=="All"&&m!=="Holiday");
    set({showEdit:true,editId:el.dataset.id,edit:{title:ev.title,date:ev.date,member:ms}});
  }
  if(a==="close-edit") set({showEdit:false,editId:null});
  if(a==="edit-toggle-member"){
    const m=el.dataset.m;
    const cur=Array.isArray(S.edit.member)?S.edit.member:[];
    set({edit:{...S.edit,member:cur.includes(m)?cur.filter(x=>x!==m):[...cur,m]}});
  }
  if(a==="save-edit"){
    const t=document.getElementById("edit-t")?.value.trim();
    const d=document.getElementById("edit-d")?.value;
    if(!t||!d)return;
    const ms=Array.isArray(S.edit.member)?S.edit.member:[];
    const mem=ms.length===0?"All":ms.length===1?ms[0]:ms;
    // Update in user events if user-added, otherwise move to user overrides
    const inUser=S.user.find(e=>e.id===S.editId);
    if(inUser){
      set({user:S.user.map(e=>e.id===S.editId?{...e,title:t,date:d,member:mem}:e),showEdit:false,editId:null});
    } else {
      // For embedded/cozi events, add override to user array and hide original
      set({user:[...S.user,{id:S.editId,title:t,date:d,member:mem,source:"edited"}],
           events:S.events.filter(e=>e.id!==S.editId),showEdit:false,editId:null});
    }
  }
  if(a==="delete-event"){
    const id=el.dataset.id;
    set({user:S.user.filter(e=>e.id!==id),events:S.events.filter(e=>e.id!==id),showEdit:false,editId:null});
  }
  if(a==="toggle-member"){
    const m=el.dataset.m;
    const cur=Array.isArray(S.nev.member)?S.nev.member:[];
    const updated=cur.includes(m)?cur.filter(x=>x!==m):[...cur,m];
    set({nev:{...S.nev,member:updated}});
  }
  if(a==="add"){
    const t=document.getElementById("et")?.value.trim(),d=document.getElementById("ed")?.value;
    const ms=Array.isArray(S.nev.member)?S.nev.member:[];
    const mem=ms.length===0?"All":ms.length===1?ms[0]:ms;
    if(t&&d)set({user:[...S.user,{id:"u"+Date.now(),title:t,date:d,member:mem,source:"user"}],showAdd:false,nev:{title:"",member:[],date:""}});
  }
  if(a==="tog")  set({hugo:S.hugo.map(t=>t.id===+el.dataset.id?{...t,done:!t.done}:t)});
  if(a==="reset")set({hugo:HT.map((t,i)=>({...t,id:i,done:false}))});
}

render();
// Try live sync in background after initial render
setTimeout(fetchLive, 500);
</script>
